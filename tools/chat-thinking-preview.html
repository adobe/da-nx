<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat “Thinking” preview — da-nx</title>
    <link rel="stylesheet" href="/nx2/styles/styles.css" />
    <link rel="stylesheet" href="/nx2/blocks/chat/chat.css" />
    <style>
      body {
        margin: 0;
        padding: var(--s2-spacing-400, 24px);
        font-family: var(--s2-font-family, system-ui, sans-serif);
        background: var(--s2-gray-50, #f5f5f5);
        color: var(--s2-gray-800);
      }

      .preview-wrap {
        max-width: 720px;
        margin: 0 auto;
      }

      .preview-hint {
        font-size: var(--s2-body-size-xs, 0.75rem);
        color: var(--s2-gray-700);
        margin: 0 0 var(--s2-spacing-200, 12px);
        line-height: 1.4;
      }

      .preview-hint code {
        font-size: 0.9em;
        padding: 0.1em 0.35em;
        border-radius: var(--s2-corner-radius-300);
        background: var(--s2-gray-200);
      }

      /* Match nx-chat surface width / padding so the chip sits like production */
      .preview-surface {
        box-sizing: border-box;
        max-width: 720px;
        min-width: 200px;
        margin: 0 auto;
        padding: var(--s2-spacing-200);
        border: 1px solid var(--s2-gray-300);
        border-radius: var(--s2-corner-radius-500);
        background: light-dark(#fff, #000);
      }
    </style>
  </head>
  <body>
    <div class="preview-wrap">
      <p class="preview-hint">
        Live preview of <code>.chat-thinking</code> inside
        <code>.chat-messages-container</code> — same structure as
        <code>nx-chat</code>. Edit <code>nx2/blocks/chat/chat.css</code> and refresh.
        Open via local dev server, e.g.
        <code>http://localhost:6456/tools/chat-thinking-preview.html</code>
      </p>
      <div class="preview-surface">
        <div class="chat-messages-container" aria-hidden="true">
          <div class="chat-thinking">Thinking...</div>
        </div>
      </div>
    </div>
  </body>
</html>
